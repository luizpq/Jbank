plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.3' // Versão estável atual
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.jbank' // Sugestão para combinar com seus pacotes
version = '0.0.1-SNAPSHOT'
description = 'BancoLuiz'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

bootRun {
    standardInput = System.in
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Starter do Spring para Banco de Dados (Essencial!)
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'

    // O Driver do Postgres (O tradutor)
    implementation 'org.postgresql:postgresql:42.7.2'

    implementation 'org.springframework.boot:spring-boot-starter'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
